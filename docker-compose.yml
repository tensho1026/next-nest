services:
  db:
    image: mysql:8.0
    container_name: next-nest-db
    restart: always
    environment:
      MYSQL_DATABASE: myapp_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql

  api:
    build: ./api
    container_name: next-nest-api
    ports:
      - "3001:3000" # NestJSのポート
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://root:password@db:3306/myapp_db

  web:
    build: ./web
    container_name: next-nest-web
    ports:
      - "3000:3000" # Next.jsのポート
    depends_on:
      - api