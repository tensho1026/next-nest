name: Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Web (Next.js) のジョブ
  web-ci:
    runs-on: ubuntu-latest
    # webディレクトリ配下の変更があった時のみ実行
    if: contains(github.event.head_commit.modified, 'web/') || github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # API (NestJS) のジョブ
  api-ci:
    runs-on: ubuntu-latest
    # apiディレクトリ配下の変更があった時のみ実行
    if: contains(github.event.head_commit.modified, 'api/') || github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json

      - name: Install dependencies
        run: npm ci

      # NestJSにLint設定がある場合は有効化
      - name: Lint
        run: npm run lint || echo "No lint script found"

      - name: Build
        run: npm run build